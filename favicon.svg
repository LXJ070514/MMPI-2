<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>
  <!-- 圆角背景 -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- M 字母 -->
  <text x="8" y="46" font-family="Arial,Helvetica,sans-serif" font-size="36" font-weight="800" fill="white">M</text>
  <!-- 2 上标 -->
  <text x="40" y="26" font-family="Arial,Helvetica,sans-serif" font-size="16" font-weight="700" fill="#c4b5fd">2</text>
  <!-- 底部心理/波形装饰线 -->
